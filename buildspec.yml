version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - echo Login successful
      - REPOSITORY_URI_STREAMLIT=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME_STREAMLIT
      - REPOSITORY_URI_WORKER=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME_WORKER
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker images...
      - docker build -t $REPOSITORY_URI_STREAMLIT:latest -f deploy/Dockerfile.frontend .
      - docker tag $REPOSITORY_URI_STREAMLIT:latest $REPOSITORY_URI_STREAMLIT:$IMAGE_TAG
      - docker build -t $REPOSITORY_URI_WORKER:latest -f deploy/Dockerfile.worker .
      - docker tag $REPOSITORY_URI_WORKER:latest $REPOSITORY_URI_WORKER:$IMAGE_TAG
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker images...
      - docker push $REPOSITORY_URI_STREAMLIT:latest
      - docker push $REPOSITORY_URI_STREAMLIT:$IMAGE_TAG
      - docker push $REPOSITORY_URI_WORKER:latest
      - docker push $REPOSITORY_URI_WORKER:$IMAGE_TAG
      - echo Writing image definitions file...
      - printf '[{"name":"streamlit","imageUri":"%s"}]' $REPOSITORY_URI_STREAMLIT:$IMAGE_TAG > imagedefinitions_streamlit.json
      - printf '[{"name":"worker","imageUri":"%s"}]' $REPOSITORY_URI_WORKER:$IMAGE_TAG > imagedefinitions_worker.json
artifacts:
  files:
    - imagedefinitions_streamlit.json
    - imagedefinitions_worker.json
