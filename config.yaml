# Configuration for NEET Knowledge RAG System
# Vector Database Settings
vector_db:
  type: faiss
  persist_dir: ./data/faiss_index

# Embedding Settings
embedding:
  provider: huggingface  # huggingface, openai
  model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  dimension: 384

# LLM Settings
llm:
  provider: openai  # ollama, openai, anthropic
  model: google/gemini-2.0-flash-001  # For OpenRouter
  base_url: https://openrouter.ai/api/v1

# Processing Settings
processing:
  chunk_size: 400    # Reduced to 400 for 128-token limit of multilingual model
  chunk_overlap: 80  # ~20% overlap

# Supported Content Types
supported_types:
  - pdf
  - scanned_pdf
  - youtube
  - video
  - audio
  - text
  - html
  - markdown

# Content Type Settings
content:
  ocr_enabled: true
  ocr_language: eng+hin  # English + Hindi for NEET
  youtube_language: en

translation:
  enabled: false
  provider: transformers
  model: google/translategemma-12b-it
  source_lang: hi
  target_lang: en
  max_chars_per_request: 1500
  apply_only_to_s3_transcript: true

# RAG Settings
rag:
  retrieval_top_k: 5
  similarity_threshold: 0.5
  # Hybrid search settings
  bm25_weight: 0.4
  faiss_weight: 0.6
  reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  reranker_top_k: 20
  max_query_expansions: 5

# Paths
paths:
  data_dir: ./data
  content_dir: ./data/content
  test_data_dir: ./tests/test_data
