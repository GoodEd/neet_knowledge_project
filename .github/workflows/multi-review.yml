name: Multi-Model Code Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip if PR title contains [skip-review]
    if: >-
      !contains(github.event.pull_request.title, '[skip-review]')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate diff

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: review-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: review-pip-

      - name: Install dependencies
        run: pip install httpx pyyaml

      - name: Run multi-model review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          python scripts/multi_model_review.py \
            --base origin/${{ github.base_ref }} \
            --head HEAD \
            --format github-comment \
            > review_output.md 2> review_stderr.txt || true
          cat review_stderr.txt >&2

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review_output.md', 'utf8');
            if (!body.trim()) {
              console.log('No review output — skipping comment.');
              return;
            }

            const marker = '<!-- multi-model-review -->';
            const fullBody = `${marker}\n${body}`;

            // Find existing comment to update (idempotent)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
              console.log(`Updated existing review comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
              console.log('Created new review comment');
            }
